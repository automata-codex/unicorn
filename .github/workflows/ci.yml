name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs on the same ref so a new push to a PR supersedes the
# previous one instead of queueing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, tsc, vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the volta pin in the root package.json. Update both together.
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: |
          npm run build --workspace @uv/auth-core
          npm run build --workspace @uv/service-interfaces
          npm run build --workspace @uv/game-systems

      - name: Lint
        run: npm run lint --workspace zoltar-be

      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/zoltar-be

      - name: Unit tests
        run: npm test --workspace zoltar-be

  frontend:
    name: Frontend (svelte-check, vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build --workspace @uv/game-systems

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/zoltar-fe

      - name: svelte-check
        run: npm run check --workspace zoltar-fe

      - name: Unit tests
        run: npm test --workspace zoltar-fe
