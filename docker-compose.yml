services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway:10
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./infra/db/migrations:/flyway/sql:ro
    environment:
      FLYWAY_URL: ${FLYWAY_URL}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${FLYWAY_PASSWORD}
      FLYWAY_CLEAN_DISABLED: "false"  # local dev only — never enable in prod
    command: migrate
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: apps/zoltar-be/Dockerfile
    depends_on:
      flyway:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NODE_ENV: development
      PORT: 3000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.zoltar.local`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"

  frontend:
    build:
      context: .
      dockerfile: apps/zoltar-fe/Dockerfile
    ports:
      - "5173:5173"
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM}
      INTERNAL_API_URL: http://backend:3000
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.zoltar.local`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"

  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"     # dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/traefik.yml:ro
      - ./infra/traefik/certs:/certs:ro
    depends_on:
      - backend
      - frontend

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # Web UI: http://localhost:8025

volumes:
  pgdata:
