<!doctype html>
<html lang="en" data-theme="mothership">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/favicon.svg" />
		<title>Zoltar</title>
	</head>
	<body>
		<div id="app"></div>
		<script>
			// Rewrite non-hash paths to hash form before the router initializes, so
			// server-issued redirects (e.g. magic-link verify → `/signin?error=invalid_token`)
			// land on the correct route under hash-based routing. This must run
			// synchronously before the ES module bundle is evaluated, because
			// svelte-spa-router reads window.location at module load time.
			(function () {
				if (window.location.pathname !== '/' && !window.location.hash) {
					var newUrl = '/#' + window.location.pathname + window.location.search;
					window.history.replaceState(null, '', newUrl);
				}
			})();
		</script>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
